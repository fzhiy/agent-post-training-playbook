<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<link rel="stylesheet" href="vendor/katex/katex.min.css">
<link rel="stylesheet" href="vendor/hl/github.min.css">
<link rel="stylesheet" href="vendor/hl/github-dark.min.css" media="(prefers-color-scheme: dark)">
<style>
  :root{color-scheme:light dark}
  body{max-width:820px;margin:0 auto;padding:1rem 1.1rem 4rem;
       font:16px/1.7 -apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;word-wrap:break-word}
  h1,h2,h3{line-height:1.3;margin-top:1.6em}
  h1{font-size:1.5rem}
  h2{font-size:1.25rem;border-bottom:1px solid #8884;padding-bottom:.2em}
  code{font-family:"SFMono-Regular",Menlo,Consolas,monospace;font-size:.9em}
  :not(pre)>code{background:#8882;padding:.1em .35em;border-radius:4px}
  pre{margin:1em 0}
  pre code.hljs{border-radius:8px}
  table{border-collapse:collapse;width:100%;display:block;overflow-x:auto}
  th,td{border:1px solid #8886;padding:.4em .6em;text-align:left}
  blockquote{border-left:3px solid #8888;margin:1em 0;padding:.2em 1em;color:#888}
  a{color:#0a7}
  nav.top{font-size:.88rem;margin-bottom:1rem}
  .toc{border:1px solid #8884;border-radius:8px;padding:.4em .9em;margin:1.2em 0;font-size:.92rem;background:#8881}
  .toc summary{cursor:pointer;color:#0a7;font-weight:600}
  .toc ul{margin:.5em 0 .2em;padding-left:1.2em;list-style:none}
  .toc li{margin:.15em 0}
  .toc li.lv3{padding-left:1.1em;font-size:.95em;opacity:.8}
  .toc a{color:inherit;text-decoration:none}
  .toc a:hover{color:#0a7;text-decoration:underline}
  .katex-display{overflow-x:auto;overflow-y:hidden;padding:.2em 0}
  /* 引用: [N] = 跳转链接 → 底部 References; gist 宽屏浮于右页边 (Tufte/gwern), 窄屏隐藏。纯 CSS 零 JS。 */
  .cite-wrap{display:inline}
  .cite{color:#0a7;font-weight:600;font-size:.72em;vertical-align:super;padding:0 .12em;white-space:nowrap;text-decoration:none}
  .cite::before{content:"["}
  .cite::after{content:"]"}
  .cite:hover{text-decoration:underline}
  .cite-note{display:none}
  @media(prefers-color-scheme:dark){body{background:#16181c;color:#ddd}}
  /* 宽屏 (≥1180px): gist 默认浮现在右页边, 无需点击; [N] 仍可点击跳到底部书目 */
  @media (min-width:1180px){
    body{max-width:1200px}
    #out{max-width:720px}
    .cite-note{display:block;float:right;clear:right;
      width:320px;margin:.15em -360px .9em 0;padding:0 0 0 .8em;
      border-left:2px solid #0a7;
      font-size:.8rem;line-height:1.55;font-weight:400;color:#555}
  }
  @media (min-width:1180px) and (prefers-color-scheme:dark){
    .cite-note{color:#aaa}}
  /* 折叠简答 (L1/L2/L3): 点问题展开简答, 原生 <details>, 零 JS。 */
  details.qa{border:1px solid #8884;border-radius:6px;margin:.5em 0;padding:.2em .8em;background:#8881}
  details.qa>summary{cursor:pointer;color:#0a7;font-weight:500;list-style:none;padding:.35em 0}
  details.qa>summary::-webkit-details-marker{display:none}
  details.qa>summary::before{content:"▸ ";color:#0a7;font-weight:700}
  details.qa[open]>summary::before{content:"▾ "}
  details.qa[open]{padding-bottom:.5em}
</style>
</head>
<body>
<nav class="top"><a href="index.html">← 复习索引 / Study Index</a></nav>
<article id="out">{{CONTENT}}</article>
</body>
</html>
